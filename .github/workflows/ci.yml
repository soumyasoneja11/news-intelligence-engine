name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Run unit tests
        run: |
          python tests/test_ingest_unit.py
          python tests/test_trending_unit.py
          python tests/test_embedder_unit.py
          python tests/test_index_status.py
          python tests/test_dedup_unit.py

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Run integration smoke tests
        run: |
          if [ -f index/faiss.index ]; then
            python tests/test_retrieval.py
            python tests/test_intelligence.py
          else
            echo "No prebuilt index in repo — skipping integration tests."
          fi

  rebuild-index:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Run full pipeline
        env:
          TRENDING_REFERENCE: auto
        run: python src/pipeline.py
